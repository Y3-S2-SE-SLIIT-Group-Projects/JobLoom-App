name: Playwright E2E Tests

on:
  pull_request:
    branches: [main, staging, develop]
  push:
    branches: [main, develop]

env:
  ENABLE_PLAYWRIGHT: 'false'

jobs:
  playwright:
    name: Playwright Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        if: env.ENABLE_PLAYWRIGHT == 'true'
        run: npm ci

      - name: Skip Playwright workflow (disabled)
        if: env.ENABLE_PLAYWRIGHT != 'true'
        run: echo "Skipping Playwright workflow. Set ENABLE_PLAYWRIGHT='true' in this workflow file to run it."

      - name: Install Playwright browsers
        if: env.ENABLE_PLAYWRIGHT == 'true'
        run: npx playwright install --with-deps

      - name: Build app for testing
        if: env.ENABLE_PLAYWRIGHT == 'true'
        run: npm run build
        env:
          VITE_API_URL: https://jobloom.be.dilzhan.com/api

      - name: Start preview server
        if: env.ENABLE_PLAYWRIGHT == 'true'
        run: npm run preview &
        env:
          NODE_ENV: test

      - name: Wait for server to be ready
        if: env.ENABLE_PLAYWRIGHT == 'true'
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Run Playwright tests
        if: env.ENABLE_PLAYWRIGHT == 'true'
        run: npx playwright test --reporter=html,github
        env:
          CI: true
          BASE_URL: http://localhost:4173

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always() && env.ENABLE_PLAYWRIGHT == 'true'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces on failure
        uses: actions/upload-artifact@v4
        if: failure() && env.ENABLE_PLAYWRIGHT == 'true'
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
